server:
  port: 8080

spring:
  application:
    name: demo

  # Database configurations - Dual DataSource (MSSQL + Oracle)
  datasource:
    mssql:
      jdbc-url: jdbc:sqlserver://localhost:1433;databaseName=demoDB;encrypt=true;trustServerCertificate=true;
      username: sa
      password: YourStrong@Pass123
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    oracle:
      jdbc-url: jdbc:oracle:thin:@localhost:1521/FREE
      username: openbanking
      password: openbanking
      driver-class-name: oracle.jdbc.OracleDriver

  # Kafka configuration for localhost
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Use JSON serializer to automatically serialize PaymentEvent objects
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: open-banking-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Use JSON deserializer to automatically deserialize into PaymentEvent objects
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Trust our DTO package for deserialization of events
        spring.json.trusted.packages: "com.example.demo.dto"
    listener:
      ack-mode: record

  # Redis configuration for localhost
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

  # Spring Batch configurations
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

# Logging settings for monitoring output
logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.redis: INFO
    org.springframework.batch: INFO

fixedDelayForApigwToken:
  in:
    milliseconds: 5000

